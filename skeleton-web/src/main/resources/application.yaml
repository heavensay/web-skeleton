  consumer:
    check: false # ???????????????
    # ???????????????????????
    init: false
  config-center:
    # ?????? Nacos ???????? false ?????????
    check: false
    # ???????????? Nacos ???????????
    reconnect: true
  #???????????
  metadata-report:
    check: false
